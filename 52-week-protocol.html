<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="52W Protocol">
<title>52 Week Protocol</title>
<style>
  :root {
    --bg: #080c10; --panel: #0d1117; --card: #111820; --border: #1e2d3d;
    --gold: #c9a84c; --gold-l: #e8c96d; --blue: #3b82f6; --green: #22c55e;
    --red: #ef4444; --orange: #f97316; --text: #e2eaf4; --muted: #8899aa;
    --accent: #1e3a5f; --purple: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Trebuchet MS', sans-serif; min-height: 100vh; overflow-x: hidden; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  .mono { font-family: 'Courier New', monospace; }
  .label { font-size: 10px; letter-spacing: 3px; font-family: 'Courier New', monospace; }

  /* HEADER */
  #header { background: linear-gradient(135deg,#0d1520,#111e2e); padding: 18px 16px 14px; border-bottom: 1px solid var(--phase-color, #c9a84c)55; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .header-phase { font-size: 10px; letter-spacing: 4px; font-family: 'Courier New', monospace; margin-bottom: 3px; }
  .header-title { font-size: clamp(20px,5vw,32px); font-weight: bold; color: #fff; line-height: 1.1; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .weight-box { background: var(--card); border-radius: 14px; padding: 10px 16px; text-align: center; border: 1px solid; min-width: 130px; }
  .weight-val { font-size: 26px; font-weight: bold; }
  .weight-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .progress-bar-bg { height: 5px; background: var(--border); border-radius: 4px; margin-top: 6px; }
  .progress-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
  .focus-bar { margin-top: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 9px 13px; font-size: 12px; font-style: italic; border-left: 3px solid; }
  .anchors { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .anchor-chip { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; text-align: center; min-width: 68px; }
  .anchor-val { font-size: 11px; font-weight: bold; color: var(--gold-l); }
  .anchor-label { font-size: 9px; color: var(--muted); }

  /* WEEK PICKER */
  #week-strip { background: var(--panel); border-bottom: 1px solid var(--border); padding: 8px 0 0; }
  .week-scroll { display: flex; gap: 4px; padding: 0 16px 8px; overflow-x: auto; scrollbar-width: none; }
  .week-scroll::-webkit-scrollbar { display: none; }
  .week-btn { min-width: 34px; height: 34px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; font-family: 'Courier New', monospace; flex-shrink: 0; transition: all 0.15s; }
  .week-btn.active { font-weight: bold; }
  .week-btn.past { opacity: 0.5; }
  .phase-legend { display: flex; gap: 12px; padding: 6px 16px 8px; overflow-x: auto; scrollbar-width: none; }
  .phase-legend::-webkit-scrollbar { display: none; }
  .legend-item { display: flex; align-items: center; gap: 4px; white-space: nowrap; font-size: 10px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* TABS */
  #tabs { background: var(--panel); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  #tabs::-webkit-scrollbar { display: none; }
  .tab-bar { display: flex; padding: 0 12px; }
  .tab-btn { padding: 11px 14px; border: none; background: transparent; color: var(--muted); border-bottom: 2px solid transparent; font-size: 11px; letter-spacing: 1px; font-family: 'Courier New', monospace; white-space: nowrap; transition: all 0.15s; }
  .tab-btn.active { font-weight: bold; }

  /* CONTENT */
  #content { padding: 14px 14px 90px; max-width: 900px; margin: 0 auto; }

  /* CARDS */
  .card { background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
  .card.gold-border { border-color: rgba(201,168,76,0.4); }
  .card.phase-border { border-color: rgba(201,168,76,0.3); }
  .section-label { font-size: 10px; letter-spacing: 3px; font-family: 'Courier New', monospace; margin-bottom: 8px; }

  /* DAY GRID */
  .day-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; margin-bottom: 16px; }
  .day-btn { background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: 9px 3px; text-align: center; color: var(--muted); font-size: 13px; font-weight: bold; transition: all 0.15s; }
  .day-btn .day-type { font-size: 9px; margin-top: 3px; font-family: 'Courier New', monospace; }
  .day-btn .day-dry { font-size: 9px; color: var(--red); margin-top: 2px; }

  /* MACRO CHIPS */
  .macro-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
  .macro-chip { background: var(--panel); border-radius: 9px; padding: 7px 12px; border: 1px solid var(--border); }
  .macro-val { font-size: 13px; font-weight: bold; }
  .macro-label { font-size: 9px; color: var(--muted); }

  /* EXERCISE CARD */
  .ex-card { background: var(--panel); border-radius: 11px; padding: 14px; margin-bottom: 9px; border: 1px solid var(--border); }
  .ex-name { font-size: 15px; font-weight: bold; color: #fff; }
  .ex-muscle { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ex-stats { display: flex; gap: 6px; margin-top: 9px; flex-wrap: wrap; }
  .ex-stat { border-radius: 8px; padding: 6px 10px; text-align: center; border: 1px solid; }
  .ex-stat-val { font-size: 17px; font-weight: bold; }
  .ex-stat-label { font-size: 9px; color: var(--muted); }
  .ex-note { margin-top: 8px; font-size: 12px; background: rgba(59,130,246,0.1); border-radius: 8px; padding: 7px 10px; color: var(--blue); }
  .ex-gain { font-size: 11px; color: var(--green); margin-top: 5px; }

  /* MEAL CARDS */
  .meal-card { background: var(--card); border-radius: 13px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.2s; }
  .meal-card.open { border-color: rgba(34,197,94,0.6); }
  .meal-time { font-size: 10px; letter-spacing: 2px; font-family: 'Courier New', monospace; color: var(--green); }
  .meal-meta { display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; }
  .meal-meta-item { font-size: 12px; }
  .meal-expand-arrow { font-size: 16px; color: var(--muted); }
  .tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 11px; }
  .tag { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--muted); }
  .insight { border-radius: 0 9px 9px 0; padding: 8px 11px; margin-bottom: 7px; border-left: 3px solid; }
  .insight-label { font-size: 10px; letter-spacing: 1px; font-family: 'Courier New', monospace; margin-bottom: 3px; }
  .insight-text { font-size: 12px; color: var(--text); line-height: 1.6; }

  /* CHECKLIST */
  .check-item { display: flex; gap: 11px; align-items: center; padding: 12px 13px; background: var(--card); border: 1px solid var(--border); border-radius: 11px; margin-bottom: 7px; cursor: pointer; transition: all 0.15s; }
  .check-item.done { background: rgba(0,0,0,0.3); }
  .check-box { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; flex-shrink: 0; color: #000; transition: all 0.15s; }
  .check-text { font-size: 13px; color: var(--muted); transition: color 0.15s; }
  .check-item.done .check-text { color: #fff; }

  /* PRAYER CARD */
  .prayer-grid { display: flex; gap: 7px; flex-wrap: wrap; }
  .prayer-chip { background: var(--panel); border-radius: 10px; padding: 8px 12px; border: 1px solid rgba(201,168,76,0.2); text-align: center; }
  .prayer-icon { font-size: 16px; }
  .prayer-name { font-size: 11px; color: var(--gold-l); font-weight: bold; margin-top: 2px; }
  .prayer-time { font-size: 10px; color: var(--muted); }

  /* SCHEDULE */
  .schedule-item { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid rgba(30,45,61,0.4); align-items: flex-start; }
  .schedule-num { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; margin-top: 1px; }
  .schedule-text { font-size: 13px; line-height: 18px; }

  /* WEIGHT TIMELINE */
  .timeline-row { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(30,45,61,0.5); align-items: flex-start; }
  .timeline-wk { min-width: 65px; font-size: 11px; font-family: 'Courier New', monospace; color: var(--gold); font-weight: bold; }
  .timeline-weight { min-width: 85px; font-size: 14px; font-weight: bold; }
  .timeline-note { font-size: 11px; color: var(--muted); line-height: 1.5; }

  /* VITAMIN/AUTOPHAGY CARDS */
  .info-card { background: var(--card); border-radius: 13px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
  .badge { display: inline-block; border-radius: 20px; padding: 2px 10px; font-size: 10px; font-family: 'Courier New', monospace; border: 1px solid; }

  /* CIRCLE PROGRESS */
  .circle-progress { width: 66px; height: 66px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border: 4px solid; }

  /* COMPLETE BANNER */
  .complete-banner { text-align: center; padding: 24px; border-radius: 15px; margin-top: 10px; border: 1px solid rgba(34,197,94,0.4); background: rgba(34,197,94,0.06); }

  /* SCROLL HINT */
  .scroll-hint { text-align: center; font-size: 10px; color: var(--muted); padding: 6px 0 2px; font-family: 'Courier New', monospace; letter-spacing: 2px; }

  @media (max-width: 400px) {
    .header-title { font-size: 20px; }
    .day-btn { font-size: 11px; }
  }
</style>
</head>

// HELPERS
// ═══════════════════════════════════════════════════════

function getPhase(week) {
  return PHASES.find(p => week >= p.weeks[0] && week <= p.weeks[1]) || PHASES[4];
}

function estimateWeight(week) {
  if (week <= 1)  return 230;
  if (week <= 4)  return Math.round(230 - (week - 1) * 2);
  if (week <= 40) return Math.round(224 - (week - 4) * 1.25);
  if (week <= 44) return Math.round(179 - (week - 40) * 0.5);
  return Math.round(177 + (week - 44) * 0.4);
}

function getLiftWeight(lift, week) {
  const earlyWks = Math.min(week - 1, 20);
  const lateWks  = Math.max(0, week - 21);
  return Math.round(lift.start + Math.floor(earlyWks / 2) * lift.g1 + Math.floor(lateWks / 3) * lift.g2);
}

function hex(color, alpha) {
  return color + Math.round(alpha * 255).toString(16).padStart(2,'0');
}

}
function saveChecked(obj) {
  try { localStorage.setItem('p52_checks', JSON.stringify(obj)); } catch(e) {}
}

let CHECKED = loadChecked();

function isChecked(week, idx) { return !!CHECKED[`${week}-${idx}`]; }
function toggleChecked(week, idx) {
  const key = `${week}-${idx}`;
  CHECKED[key] = !CHECKED[key];

}

      <div style="font-size:13px;color:var(--muted);line-height:1.7">
        Your dry fasting + 16/8 + fasted lifts + 11k steps creates elite-tier autophagy. At <strong style="color:#fff">Week ${S.week}</strong>, you've theoretically cleared <strong style="color:var(--green)">${lost} lbs</strong> — skin autophagy is actively tightening collagen faster than the fat leaves.
      </div>
    </div>

    ${AUTOPHAGY.map(item=>`
      <div class="info-card" style="border-color:${hex(item.color,0.25)}">
        <div style="display:flex;gap:11px;align-items:flex-start">
          <div style="font-size:26px">${item.icon}</div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
              <div style="font-size:15px;font-weight:bold;color:#fff">${item.title}</div>
              <span class="badge" style="color:${item.color};border-color:${item.color};background:${hex(item.color,0.12)}">${item.level}</span>
            </div>
            <div style="margin-top:8px;font-size:12px;color:var(--muted);line-height:1.7;border-left:2px solid var(--border);padding-left:11px">${item.detail}</div>
          </div>
        </div>
      </div>
    `).join('')}
  `;
}

    <div class="card gold-border">
      <div class="section-label" style="color:var(--gold)">MICRONUTRIENT OPTIMIZATION · ALL 52 WEEKS</div>
      <div style="font-size:13px;color:var(--muted)">Food-first approach. Supplements fill gaps that even a perfect diet in MN winter cannot cover. These doses stay consistent all year.</div>
    </div>

    ${VITAMINS.map(v=>`
      <div class="info-card" style="border-color:${hex(v.color,0.25)}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-size:16px;font-weight:bold;color:#fff">${v.name}</div>
            <div style="font-size:11px;color:${v.color};font-family:'Courier New',monospace;margin-top:2px">${v.dose}</div>
          </div>
          <div style="background:var(--panel);border-radius:7px;padding:4px 10px;font-size:11px;color:var(--muted)">⏰ ${v.timing}</div>
        </div>

// ── CHECKLIST ─────────────────────────────────────────

function renderChecklist(phase) {
  const total = CHECKLIST.length;
  const done  = CHECKLIST.filter((_,i)=>isChecked(S.week,i)).length;
  const pct   = Math.round((done/total)*100);
  const cats  = [...new Set(CHECKLIST.map(c=>c.cat))];

  return `
    <div class="card" style="border-color:${hex(phase.color,0.35)}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div class="section-label" style="color:${phase.color}">DAILY CHECKLIST · WEEK ${S.week}</div>
          <div style="font-size:28px;font-weight:bold;color:#fff;margin-top:4px">${done}<span style="color:var(--muted);font-size:18px">/${total}</span></div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Saves automatically · Resets per week</div>
        </div>
        <div class="circle-progress" style="border-color:${done===total?'var(--green)':phase.color};color:${done===total?'var(--green)':phase.color}">${pct}%</div>
      </div>
    </div>

    ${cats.map(cat=>{
      const color = CAT_COLORS[cat] || '#fff';
      const items = CHECKLIST.map((c,i)=>({...c,idx:i})).filter(c=>c.cat===cat);
      return `
        <div class="section-label" style="color:${color};margin-bottom:7px">${cat.toUpperCase()}</div>
        ${items.map(item=>{
          const done = isChecked(S.week, item.idx);
          return `
            <div class="check-item${done?' done':''}" onclick="checkToggle(${item.idx})"
              style="${done?`background:${hex(color,0.08)};border-color:${hex(color,0.4)}`:''}">
              <div class="check-box" style="${done?`background:${color};border-color:${color}`:`border-color:var(--border)`}">${done?'✓':''}</div>
              <div class="check-text">${item.item}</div>
            </div>
          `;
        }).join('')}
        <div style="height:6px"></div>
      `;
    }).join('')}

    ${done===total?`
      <div class="complete-banner">
        <div style="font-size:40px">🏆</div>
        <div style="font-size:20px;font-weight:bold;color:var(--green);margin-top:8px">Week ${S.week} Day Complete</div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px">Every day compounds. ${52-S.week} weeks to go. Stay the course.</div>
      </div>
    `:''}
  `;
}

// ═══════════════════════════════════════════════════════
// EVENT HANDLERS (global, called from HTML)
// ═══════════════════════════════════════════════════════

function setWeek(w) {
  S.week = w;
  S.expandedMeal = null;
  render();
}

function setTab(t) {
  S.tab = t;
  S.expandedMeal = null;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function setDayIdx(i) {
  S.dayIdx = i;
  render();
}

function toggleMeal(idx) {
  S.expandedMeal = S.expandedMeal === idx ? null : idx;
  renderContent(getPhase(S.week), WEEK_DAYS[S.dayIdx], Math.max(0,230-estimateWeight(S.week)), Math.max(0,estimateWeight(S.week)-180), 0);
}

function checkToggle(idx) {
  toggleChecked(S.week, idx);
  renderContent(getPhase(S.week), WEEK_DAYS[S.dayIdx], Math.max(0,230-estimateWeight(S.week)), Math.max(0,estimateWeight(S.week)-180), 0);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
render();
</script>
</body>
</html>
